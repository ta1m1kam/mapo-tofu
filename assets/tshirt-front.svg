<?xml version="1.0" encoding="UTF-8"?>
<!--
  mapo-tofu · T-shirt front design (simple / philosophical)
  Print area: 1200 × 1600 (3:4) — fits A4 / 30×40cm chest print
  Ink: black on transparent (for light shirts). QR has its own white panel.
  scan QR ↦ https://ta1m1kam.github.io/mapo-tofu/
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 1600"
     width="1200" height="1600">

  <defs>
    <style>
      .ink     { fill: #0a0808; }
      .dim     { fill: #6a5a44; }
      .mincho  { font-family: 'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif; font-weight: 200; }
      .italic  { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; }
      .mono    { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .hair    { stroke: #0a0808; stroke-width: 0.8; fill: none; }
    </style>
  </defs>

  <!-- top hair-line -->
  <line class="hair" x1="540" y1="100" x2="660" y2="100"/>

  <!-- main title 麻婆豆腐 -->
  <text x="600" y="240" text-anchor="middle"
        class="mincho ink"
        font-size="118" letter-spacing="42">
    麻婆豆腐
  </text>

  <!-- pinyin -->
  <text x="600" y="306" text-anchor="middle"
        class="italic dim"
        font-size="34" letter-spacing="0.32em">
    mápó dòufu
  </text>

  <!-- separator -->
  <line class="hair" x1="540" y1="370" x2="660" y2="370"/>

  <!-- epigraph -->
  <text x="600" y="450" text-anchor="middle"
        class="mincho ink"
        font-size="34" letter-spacing="0.04em">
    豆腐は無形より生まれ、
  </text>
  <text x="600" y="498" text-anchor="middle"
        class="mincho ink"
        font-size="34" letter-spacing="0.04em">
    火と辣に出会いて姿を得る。
  </text>

  <!-- attribution -->
  <text x="600" y="566" text-anchor="middle"
        class="italic dim"
        font-size="22" letter-spacing="0.42em" text-transform="uppercase">
    CHEN MAPO · 1862 · CHENGDU
  </text>

  <!-- QR panel with chili (already self-contained: white circle + chili icon) -->
  <g transform="translate(360 660)">
    <image xlink:href="qr-chili.png" x="0" y="0" width="480" height="480"
           image-rendering="pixelated"/>
  </g>

  <!-- url -->
  <text x="600" y="1220" text-anchor="middle"
        class="mono ink"
        font-size="22" letter-spacing="0.18em">
    ta1m1kam.github.io / mapo-tofu
  </text>

  <!-- separator -->
  <line class="hair" x1="500" y1="1290" x2="700" y2="1290"/>

  <!-- one-line tagline -->
  <text x="600" y="1370" text-anchor="middle"
        class="mincho ink"
        font-size="30" letter-spacing="0.32em">
    豆 腐 増 殖 中
  </text>

  <!-- italic latin -->
  <text x="600" y="1430" text-anchor="middle"
        class="italic dim"
        font-size="22" letter-spacing="0.42em">
    tofu, multiplying.
  </text>

  <!-- final hair-line -->
  <line class="hair" x1="540" y1="1500" x2="660" y2="1500"/>

</svg>
