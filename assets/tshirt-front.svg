<?xml version="1.0" encoding="UTF-8"?>
<!--
  mapo-tofu · T-shirt front design
  Print area: 1200 × 1600 (3:4) — fits A4 / 30×40cm chest print
  scan QR ↦ https://ta1m1kam.github.io/mapo-tofu/
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1200 1600"
     width="1200" height="1600">

  <defs>
    <style>
      .red       { fill: #c0392b; }
      .redDeep   { fill: #8b1a1a; }
      .gold      { fill: #d4af37; }
      .ink       { fill: #1a0a0a; }
      .cream     { fill: #fff7e6; }
      .mincho    { font-family: 'Ma Shan Zheng', 'ZCOOL XiaoWei', 'Yu Mincho', 'Hiragino Mincho ProN', serif; }
      .mono      { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .pinyin    { font-family: 'Long Cang', italic, serif; font-style: italic; }
    </style>
  </defs>

  <!-- gold cloud border top -->
  <g opacity="0.85">
    <line x1="160" y1="120" x2="1040" y2="120" stroke="#d4af37" stroke-width="3"/>
    <g transform="translate(150 120)" fill="#d4af37">
      <circle cx="0" cy="0" r="6"/>
      <circle cx="900" cy="0" r="6"/>
    </g>
  </g>

  <!-- decorative lantern motifs -->
  <text x="120" y="172" font-size="56" text-anchor="middle">🏮</text>
  <text x="1080" y="172" font-size="56" text-anchor="middle">🏮</text>

  <!-- main title 麻婆豆腐 -->
  <text x="600" y="290" text-anchor="middle"
        class="mincho ink"
        font-size="148" letter-spacing="20"
        style="paint-order: stroke; stroke: #d4af37; stroke-width: 2;">
    麻婆豆腐
  </text>

  <!-- pinyin -->
  <text x="600" y="356" text-anchor="middle"
        class="pinyin red"
        font-size="38" letter-spacing="0.3em" font-style="italic">
    mápó dòufu
  </text>

  <!-- subtitle -->
  <text x="600" y="404" text-anchor="middle"
        class="mincho ink"
        font-size="22" letter-spacing="0.4em">
    豆 腐 増 殖 中
  </text>

  <!-- QR panel (white circle ring, chili in center) -->
  <g transform="translate(360 470)">
    <!-- QR PNG (already includes white panel + chili icon) -->
    <image xlink:href="qr-chili.png" x="0" y="0" width="480" height="480"
           image-rendering="pixelated"/>
    <!-- gold dashed ring around QR for premium feel -->
    <rect x="-12" y="-12" width="504" height="504"
          fill="none" stroke="#d4af37" stroke-width="3"
          stroke-dasharray="14 6" rx="20"/>
  </g>

  <!-- url label below QR -->
  <text x="600" y="1030" text-anchor="middle"
        class="mono ink"
        font-size="22" letter-spacing="0.18em">
    ta1m1kam.github.io / mapo-tofu
  </text>

  <!-- separator: gold cloud band -->
  <g transform="translate(0 1080)" opacity="0.85">
    <line x1="160" y1="0" x2="1040" y2="0" stroke="#d4af37" stroke-width="2"/>
    <text x="600" y="14" text-anchor="middle" class="gold mincho" font-size="32" letter-spacing="0.4em">中 華 風 味</text>
  </g>

  <!-- catchphrase -->
  <text x="600" y="1200" text-anchor="middle"
        class="mincho redDeep"
        font-size="38" letter-spacing="0.18em">
    豆 腐 が ど ん ど ん 増 え る
  </text>

  <text x="600" y="1252" text-anchor="middle"
        class="pinyin red"
        font-size="26" letter-spacing="0.32em" font-style="italic">
    pop · cute · spicy · 麻
  </text>

  <!-- chili emoji row -->
  <text x="600" y="1340" text-anchor="middle" font-size="64" letter-spacing="0.1em">
    🌶️ 🥟 🐼 🥬 🍵
  </text>

  <!-- bottom seal -->
  <g transform="translate(600 1450)">
    <rect x="-50" y="-50" width="100" height="100" rx="14"
          fill="#c0392b" stroke="#d4af37" stroke-width="3"/>
    <text x="0" y="22" text-anchor="middle" class="mincho cream"
          font-size="64" letter-spacing="0">福</text>
  </g>

  <!-- bottom gold cloud border -->
  <g opacity="0.85" transform="translate(0 1530)">
    <line x1="160" y1="0" x2="1040" y2="0" stroke="#d4af37" stroke-width="3"/>
    <circle cx="150" cy="0" r="6" fill="#d4af37"/>
    <circle cx="1050" cy="0" r="6" fill="#d4af37"/>
  </g>

</svg>
