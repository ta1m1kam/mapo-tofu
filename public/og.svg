<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 灼熱 BG gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#6a1a08"/>
      <stop offset="55%" stop-color="#4a1004"/>
      <stop offset="100%" stop-color="#2a0a02"/>
    </radialGradient>
    <radialGradient id="hot1" cx="78%" cy="22%" r="38%">
      <stop offset="0%"  stop-color="#e84616" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#b8280a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hot2" cx="18%" cy="58%" r="35%">
      <stop offset="0%"  stop-color="#ff5a1e" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topglow" cx="50%" cy="0%" r="50%">
      <stop offset="0%"  stop-color="#ff8c3c" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>

    <!-- 立方体グラデーション -->
    <linearGradient id="g-top-1" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff8e8"/>
    </linearGradient>
    <linearGradient id="g-left-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0e0bb"/>
      <stop offset="100%" stop-color="#7a4a1c"/>
    </linearGradient>
    <linearGradient id="g-right-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#caa66a"/>
      <stop offset="100%" stop-color="#7a4a1c"/>
    </linearGradient>
    <linearGradient id="g-fill-1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fff8e8"/>
      <stop offset="50%"  stop-color="#f0e0bb"/>
      <stop offset="100%" stop-color="#7a4a1c"/>
    </linearGradient>

    <filter id="tofu-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#hot1)"/>
  <rect width="1200" height="630" fill="url(#hot2)"/>
  <rect width="1200" height="630" fill="url(#topglow)"/>

  <!-- 立方体を散らす。汎用的な path 描画。
       シルエットを fill 裏打ち → 3 面 (top/left/right) を上塗り。
       cube(cx, cy, r) の "r" は cube の半径 (silhouette半径) -->
  <!-- helper: 中心 (cx,cy)、半径 r で iso cube -->

  <!--
    cube vertices in original viewBox 0-100:
      TOP        (50,  4)
      RIGHT-MID  (93, 27)   LOWER-RIGHT (93, 73)
      BOTTOM     (50, 96)
      LOWER-LEFT ( 7, 73)   LEFT-MID    ( 7, 27)
      CENTER     (50, 50)
    Map to (cx,cy) center with scale s=r/46:
      offsetY of each vertex = (vertY - 50) * s
      offsetX of each vertex = (vertX - 50) * s
  -->

  <!-- cube 1 (大: r=140) at (270, 200) -->
  <g transform="translate(270 200)" filter="url(#tofu-shadow)">
    <path d="M 0 -140 L 131 -70 L 131 70 L 0 140 L -131 70 L -131 -70 Z" fill="url(#g-fill-1)"/>
    <path d="M 0 -140 L 131 -70 L 0 0 L -131 -70 Z" fill="url(#g-top-1)"/>
    <path d="M -131 -70 L 0 0 L 0 140 L -131 70 Z" fill="url(#g-left-1)"/>
    <path d="M 131 -70 L 0 0 L 0 140 L 131 70 Z" fill="url(#g-right-1)"/>
  </g>

  <!-- cube 2 (中: r=90) at (920, 130) -->
  <g transform="translate(920 130)" filter="url(#tofu-shadow)">
    <path d="M 0 -90 L 84 -45 L 84 45 L 0 90 L -84 45 L -84 -45 Z" fill="url(#g-fill-1)"/>
    <path d="M 0 -90 L 84 -45 L 0 0 L -84 -45 Z" fill="url(#g-top-1)"/>
    <path d="M -84 -45 L 0 0 L 0 90 L -84 45 Z" fill="url(#g-left-1)"/>
    <path d="M 84 -45 L 0 0 L 0 90 L 84 45 Z" fill="url(#g-right-1)"/>
  </g>

  <!-- cube 3 (中: r=110) at (560, 480) -->
  <g transform="translate(560 480)" filter="url(#tofu-shadow)">
    <path d="M 0 -110 L 103 -55 L 103 55 L 0 110 L -103 55 L -103 -55 Z" fill="url(#g-fill-1)"/>
    <path d="M 0 -110 L 103 -55 L 0 0 L -103 -55 Z" fill="url(#g-top-1)"/>
    <path d="M -103 -55 L 0 0 L 0 110 L -103 55 Z" fill="url(#g-left-1)"/>
    <path d="M 103 -55 L 0 0 L 0 110 L 103 55 Z" fill="url(#g-right-1)"/>
  </g>

  <!-- cube 4 (小: r=60) at (1050, 460) -->
  <g transform="translate(1050 460)" filter="url(#tofu-shadow)">
    <path d="M 0 -60 L 56 -30 L 56 30 L 0 60 L -56 30 L -56 -30 Z" fill="url(#g-fill-1)"/>
    <path d="M 0 -60 L 56 -30 L 0 0 L -56 -30 Z" fill="url(#g-top-1)"/>
    <path d="M -56 -30 L 0 0 L 0 60 L -56 30 Z" fill="url(#g-left-1)"/>
    <path d="M 56 -30 L 0 0 L 0 60 L 56 30 Z" fill="url(#g-right-1)"/>
  </g>

  <!-- タイトル 麻婆豆腐増殖 -->
  <text
    x="600" y="345"
    text-anchor="middle"
    font-family="'Noto Serif JP','Yu Mincho','Hiragino Mincho ProN',serif"
    font-weight="200"
    font-size="120"
    letter-spacing="48"
    fill="#f5e6c8"
    style="paint-order: stroke; stroke: rgba(0,0,0,0.4); stroke-width: 2;">麻婆豆腐増殖</text>

  <!-- URL -->
  <text
    x="600" y="585"
    text-anchor="middle"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="22"
    letter-spacing="6"
    fill="rgba(245, 230, 200, 0.55)">ta1m1kam.github.io / mapo-tofu</text>
</svg>
